<div class="page-container">
  <mat-card class="form-card">
    <mat-card-header>
      <mat-card-title>📅 Étape 2 : Période de l'Exercice Fiscal</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="exerciceForm">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Date de début</mat-label>
          <input matInput [matDatepicker]="pickerDebut" formControlName="dateDebut">
          <mat-datepicker-toggle matSuffix [for]="pickerDebut"></mat-datepicker-toggle>
          <mat-datepicker #pickerDebut></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Date de fin</mat-label>
          <input matInput [matDatepicker]="pickerFin" formControlName="dateFin">
          <mat-datepicker-toggle matSuffix [for]="pickerFin"></mat-datepicker-toggle>
          <mat-datepicker #pickerFin></mat-datepicker>
          <mat-error *ngIf="exerciceForm.get('dateFin')?.hasError('dureeInvalid')">
            La durée de l'exercice ne peut pas dépasser 365 jours.
          </mat-error>
        </mat-form-field>
      </form>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-raised-button color="primary" (click)="next()" [disabled]="exerciceForm.invalid">
        Suivant : Déclaration ➡️
      </button>
    </mat-card-actions>
  </mat-card>
</div>
